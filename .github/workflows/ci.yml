name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: pytest -v

  build:
    name: Verify package builds
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Verify wheel installs cleanly in isolation
        run: |
          python -m venv /tmp/ci-fresh-venv
          /tmp/ci-fresh-venv/bin/pip install dist/*.whl
          /tmp/ci-fresh-venv/bin/smart-linux run "echo CI install works"
          /tmp/ci-fresh-venv/bin/smart-linux doctor
